<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>The Conn — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sketch-styles.css?v=4" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: "Inter", system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="conn-shared.jsx?v=6"></script>
<script type="text/babel" src="wire-a.jsx?v=4"></script>
<script type="text/babel" src="node-view.jsx?v=2"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "runState": "fail",
  "errorFocus": false,
  "logStream": "all"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const props = {
    runState: tweaks.runState,
    errorFocus: tweaks.errorFocus,
  };

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="dashboard"
          title="THE CONN — CI/CD Dashboard"
          subtitle="Wireframe · jefferies namespace"
        >
          <DCArtboard id="A" label="Run dashboard" width={W_A} height={H_A}>
            <WireA {...props} />
          </DCArtboard>
          <DCArtboard id="N" label="Node view — drilldown after clicking a node" width={W_NODE} height={H_NODE}>
            <NodeView stream={tweaks.logStream} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks" defaultPos={{ right: 20, bottom: 20 }}>
        <TweakSection title="Run state">
          <TweakRadio
            value={tweaks.runState}
            onChange={(v) => setTweak("runState", v)}
            options={[
              { value: "fail", label: "Failed" },
              { value: "run",  label: "Running" },
              { value: "ok",   label: "Success" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Debugging">
          <TweakToggle
            label="Error Focus mode"
            value={tweaks.errorFocus}
            onChange={(v) => setTweak("errorFocus", v)}
          />
        </TweakSection>
        <TweakSection title="Node view · log stream">
          <TweakRadio
            value={tweaks.logStream}
            onChange={(v) => setTweak("logStream", v)}
            options={[
              { value: "all",    label: "All" },
              { value: "stdout", label: "stdout" },
              { value: "stderr", label: "stderr" },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
