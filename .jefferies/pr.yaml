name: The Conn Main PR Pipeline

on:
  pull_request:
    branches:
      - main

nodes:
  - name: Lint and Format
    image: node:24-bookworm-slim
    checkout: true
    steps:
      - npm run build
      - npm run format:check
      - npm run typecheck
      - npm run lint

  - name: Build Image
    image: quay.io/buildah/stable:latest
    privileged: true
    checkout: true
    env:
      STORAGE_DRIVER: vfs
    steps:
      - buildah bud -f Containerfile -t quay.io/the-conn/the-conn .
