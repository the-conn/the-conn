name: The Conn Main PR Pipeline

on:
  pull_request:
    branches:
      - main

nodes:
  - name: Lint and Format
    image: node:24-bookworm-slim
    checkout: true
    env:
      npm_config_cache: /tmp
    steps:
      - npm install
      - npm run format:check
      - npm run typecheck
      - npm run lint
